# Development database — used by `npm run dev` (local native dev).
# Start with: docker compose -f docker-compose.dev.yml up db
services:
  db:
    container_name: inventory-dev-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
