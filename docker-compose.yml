# Production Docker Compose — Swarm stack only.
#
# Deploy: docker stack deploy -c docker-compose.yml inventory
# Dev DB: docker compose -f docker-compose.dev.yml up db
services:
  # --- Production server (Swarm only) ---
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: ghcr.io/league-infrastructure/inventory-server:${TAG:-latest}
    networks:
      - default
      - caddy
    secrets:
      - database_url
      - session_secret
      - admin_password
      - mcp_default_token
      - google_client_id
      - google_client_secret
      - do_spaces_key
      - do_spaces_secret
      - anthropic_api_key
      - slack_signing_secret
      - slack_bot_user_oauth_token
    entrypoint: ["/app/entrypoint.sh"]
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN:-inventory.jointheleague.org}
      QR_DOMAIN: ${QR_DOMAIN:-https://inventory.jointheleague.org}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://inventory.jointheleague.org/api/auth/google/callback}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-jtl-inventory}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-sfo3}
    deploy:
      labels:
        caddy: ${APP_DOMAIN:-inventory.jointheleague.org}
        caddy.reverse_proxy: "{{upstreams 3000}}"
      replicas: 1
secrets:
  database_url:
    external: true
  session_secret:
    external: true
  admin_password:
    external: true
  mcp_default_token:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  do_spaces_key:
    external: true
  do_spaces_secret:
    external: true
  anthropic_api_key:
    external: true
  slack_signing_secret:
    external: true
  slack_bot_user_oauth_token:
    external: true

networks:
  caddy:
    external: true
