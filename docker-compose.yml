# Unified Docker Compose — serves both local dev and production.
#
# Local dev:  docker compose up db        (just the database)
# Production: docker stack deploy -c docker-compose.yml inventory
services:
  # --- Database (used by both dev and production) ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Production server (Swarm only) ---
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: inventory-server:${TAG:-latest}
    networks:
      - default
      - caddy
    secrets:
      - database_url
      - session_secret
      - admin_password
      - mcp_default_token
      - google_client_id
      - google_client_secret
      - do_spaces_key
      - do_spaces_secret
      - anthropic_api_key
      - slack_signing_secret
      - slack_bot_user_oauth_token
    entrypoint: ["/app/entrypoint.sh"]
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN:-inventory.jointheleague.org}
      QR_DOMAIN: ${QR_DOMAIN:-https://inventory.jointheleague.org}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://inventory.jointheleague.org/api/auth/google/callback}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-jtl-inventory}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-sfo3}
    deploy:
      labels:
        caddy: ${APP_DOMAIN:-inventory.jointheleague.org}
        caddy.reverse_proxy: "{{upstreams 3000}}"
      replicas: 1
      placement:
        constraints: [node.role == manager]
secrets:
  database_url:
    external: true
  session_secret:
    external: true
  admin_password:
    external: true
  mcp_default_token:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  do_spaces_key:
    external: true
  do_spaces_secret:
    external: true
  anthropic_api_key:
    external: true
  slack_signing_secret:
    external: true
  slack_bot_user_oauth_token:
    external: true

networks:
  caddy:
    external: true

volumes:
  pgdata:
